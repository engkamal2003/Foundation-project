<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | نظام الإدخال والتقارير</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #1d4ed8;
      --primary-dark: #1e40af;
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --error: #ef4444;
      --success: #22c55e;
      --input-bg: #0f172a;
    }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* خلفية متحركة */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(29,78,216,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(6,182,212,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 1.5rem;
      position: relative;
      z-index: 1;
    }

    /* شعار وعنوان */
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--primary), #7c3aed);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1rem;
      box-shadow: 0 8px 32px rgba(29,78,216,0.4);
    }

    .login-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.3rem;
    }

    .login-header p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* البطاقة */
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    /* حقول الإدخال */
    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i.icon-left {
      position: absolute;
      right: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.95rem;
      pointer-events: none;
    }

    .input-wrapper input {
      width: 100%;
      padding: 0.75rem 2.5rem 0.75rem 2.75rem;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      direction: ltr;
      text-align: right;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .input-wrapper input::placeholder { color: var(--text-muted); opacity: 0.6; }

    .input-wrapper input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(29,78,216,0.2);
    }

    .input-wrapper input.error { border-color: var(--error); }

    /* زر إظهار/إخفاء كلمة المرور */
    .toggle-pass {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.25rem;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .toggle-pass:hover { color: var(--text); }

    /* زر الدخول */
    .btn-login {
      width: 100%;
      padding: 0.875rem;
      background: linear-gradient(135deg, var(--primary), #2563eb);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
      box-shadow: 0 4px 16px rgba(29,78,216,0.35);
    }

    .btn-login:hover:not(:disabled) {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(29,78,216,0.45);
    }

    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    /* رسالة الخطأ */
    .error-msg {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #fca5a5;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      text-align: center;
    }

    .error-msg.show { display: flex; align-items: center; justify-content: center; gap: 0.5rem; }

    /* مؤشر التحميل */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* تذييل */
    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">📊</div>
      <h1>نظام الإدخال والتقارير</h1>
      <p>سجّل دخولك للمتابعة</p>
    </div>

    <div class="login-card">
      <div class="error-msg" id="errorMsg">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorText">اسم المستخدم أو كلمة المرور غير صحيحة</span>
      </div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="username"><i class="fas fa-user" style="margin-left:6px"></i>اسم المستخدم</label>
          <div class="input-wrapper">
            <i class="fas fa-user icon-left"></i>
            <input type="text" id="username" name="username"
              placeholder="أدخل اسم المستخدم" autocomplete="username" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password"><i class="fas fa-lock" style="margin-left:6px"></i>كلمة المرور</label>
          <div class="input-wrapper">
            <i class="fas fa-lock icon-left"></i>
            <input type="password" id="password" name="password"
              placeholder="أدخل كلمة المرور" autocomplete="current-password" required>
            <button type="button" class="toggle-pass" id="togglePass" tabindex="-1">
              <i class="fas fa-eye" id="togglePassIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="btnLogin">
          <div class="spinner" id="spinner"></div>
          <i class="fas fa-sign-in-alt" id="btnIcon"></i>
          <span id="btnText">تسجيل الدخول</span>
        </button>
      </form>
    </div>

    <div class="login-footer">
      <i class="fas fa-shield-alt" style="margin-left:4px"></i>
      جميع البيانات محمية ومشفّرة
    </div>
  </div>

  <script>
    // ── إظهار/إخفاء كلمة المرور ─────────────────────────────────
    document.getElementById('togglePass').addEventListener('click', () => {
      const inp  = document.getElementById('password');
      const icon = document.getElementById('togglePassIcon');
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        inp.type = 'password';
        icon.className = 'fas fa-eye';
      }
    });

    // ── التحقق من وجود جلسة نشطة ────────────────────────────────
    (async () => {
      const token = localStorage.getItem('_authToken');
      if (!token) return;
      try {
        const res = await fetch('/api/auth/me', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.ok) {
          window.location.href = '/';
        }
      } catch {}
    })();

    // ── تسجيل الدخول ─────────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const errorTxt = document.getElementById('errorText');
      const spinner  = document.getElementById('spinner');
      const btnIcon  = document.getElementById('btnIcon');
      const btnText  = document.getElementById('btnText');
      const btn      = document.getElementById('btnLogin');

      // إخفاء الخطأ السابق
      errorMsg.classList.remove('show');
      document.getElementById('username').classList.remove('error');
      document.getElementById('password').classList.remove('error');

      // تفعيل التحميل
      btn.disabled = true;
      spinner.style.display = 'block';
      btnIcon.style.display = 'none';
      btnText.textContent   = 'جاري التحقق...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok && data.token) {
          // حفظ التوكن والمستخدم
          localStorage.setItem('_authToken',    data.token);
          localStorage.setItem('_authUser',     JSON.stringify(data.user));
          // توجيه إلى الصفحة المطلوبة
          const next = new URLSearchParams(location.search).get('next') || '/';
          window.location.href = next;
        } else {
          throw new Error(data.error || 'اسم المستخدم أو كلمة المرور غير صحيحة');
        }
      } catch (err) {
        errorTxt.textContent = err.message;
        errorMsg.classList.add('show');
        document.getElementById('username').classList.add('error');
        document.getElementById('password').classList.add('error');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
        btnIcon.style.display = '';
        btnText.textContent   = 'تسجيل الدخول';
      }
    });

    // ── Enter في حقل المستخدم ينتقل لكلمة المرور ────────────────
    document.getElementById('username').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('password').focus();
    });
  </script>
</body>
</html>
